subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: vla
      description: 视觉语言动作
      enabled: true
      paper_sources:
        - arxiv
        - biorxiv
      keywords:
        - keyword: vision language action
          keyword_cn: 视觉语言动作
          query: Vision language action models for robot manipulation
        - keyword: multimodal learning
          keyword_cn: 多模态学习
          query: Multimodal learning combining vision language and action
        - keyword: visual grounding
          keyword_cn: 视觉定位
          query: Visual grounding of language instructions for action
        - keyword: language conditioned policy
          keyword_cn: 语言条件策略
          query: Language conditioned policy learning for robots
        - keyword: embodied AI
          keyword_cn: 具身人工智能
          query: Embodied AI with vision language action models
        - keyword: robotic manipulation
          keyword_cn: 机器人操作
          query: Robotic manipulation using vision language action
      intent_queries:
        - query: How do vision language action models integrate visual and textual information for action prediction?
          query_cn: 视觉语言动作模型如何整合视觉和文本信息进行动作预测？
          enabled: true
          source: manual
          note: ''
        - query: What are the latest advances in multimodal learning for robot control using VLAs?
          query_cn: 使用VLA进行机器人控制的多模态学习最新进展是什么？
          enabled: true
          source: manual
          note: ''
        - query: Explain the role of language grounding in vision language action policies.
          query_cn: 解释语言定位在视觉 语言 动作策略中的作用。
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-07-06T22:51:23.290Z'
    - tag: d-mesh
      description: 3D网格相关检索
      enabled: true
      paper_sources:
        - arxiv
        - biorxiv
      keywords:
        - keyword: 3D mesh reconstruction
          keyword_cn: 三维网格重建
          query: 3D mesh reconstruction techniques
        - keyword: mesh simplification
          keyword_cn: 网格简化
          query: algorithm for simplifying 3D mesh
        - keyword: mesh texture mapping
          keyword_cn: 网格纹理映射
          query: texture mapping on 3D meshes
        - keyword: mesh optimization
          keyword_cn: 网格优化
          query: optimizing 3D mesh geometry
      intent_queries:
        - query: find papers on 3D mesh reconstruction from point clouds
          query_cn: 查找从点云进行三维网格重建的论文
          enabled: true
          source: manual
          note: ''
        - query: compare deep learning models for mesh segmentation
          query_cn: 比较用于网格分割的深度学习模型
          enabled: true
          source: manual
          note: ''
        - query: how to generate 3D meshes from images
          query_cn: 如何从图像生成三维网格
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-07-06T22:51:49.930Z'
